services:
  moondream-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/like-a-freedom/moondream_api:cloud
    container_name: moondream_api
    restart: unless-stopped
    environment:
      - MOONDREAM_API_KEY=${MOONDREAM_API_KEY?err}
      - MOONDREAM_MODE=${MOONDREAM_MODE:-api}
      - MODEL_NAME=${MODEL_NAME:-moondream3.1-9B-A2B}
    ports:
      - 18000:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Local inference via Photon (NVIDIA GPU required).
  # Start with: docker compose --profile local up -d
  moondream-api-local:
    profiles: ["local"]
    build:
      context: .
      dockerfile: Dockerfile.nvidia
    image: ghcr.io/like-a-freedom/moondream_api:local
    container_name: moondream_api_local
    restart: unless-stopped
    environment:
      - MOONDREAM_API_KEY=${MOONDREAM_API_KEY?err}
      - MOONDREAM_MODE=local
      - MODEL_NAME=${MODEL_NAME:-moondream3.1-9B-A2B}
    ports:
      - 18001:8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
